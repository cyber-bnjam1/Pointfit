<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PointFit - Test</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; gap: 16px; }
  button { background: #FF6B35; color: white; border: none; border-radius: 12px; padding: 16px 32px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  #log { background: white; border-radius: 12px; padding: 16px; width: 320px; min-height: 100px; font-size: 0.85rem; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>

<button onclick="testDemo()">🎮 Tester le mode démo</button>
<div id="log">En attente...</div>

<script src="foods.js"></script>
<script src="app.js"></script>
<script>
function testDemo() {
  var log = document.getElementById('log');
  log.textContent = '';
  function l(msg) { log.textContent += msg + '\n'; }

  l('--- TEST DÉMO ---');
  l('window.launchDemo : ' + typeof window.launchDemo);
  l('FOODS_DB : ' + (typeof FOODS_DB !== 'undefined' ? FOODS_DB.length + ' aliments' : 'MANQUANT'));

  var ids = ['splash','auth-screen','app','demo-btn','demo-banner-app','toast',
             'ring-remaining','stat-used','stat-budget','journal-content',
             'header-date','profile-display-name'];
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    l((el ? '✅' : '❌') + ' #' + id);
  });

  if (typeof window.launchDemo === 'function') {
    l('\nAppel de launchDemo()...');
    try {
      window.launchDemo();
      l('✅ launchDemo() exécuté sans erreur');
    } catch(e) {
      l('❌ ERREUR : ' + e.message);
      l(e.stack);
    }
  } else {
    l('❌ launchDemo non trouvé sur window');
  }
}
</script>
</body>
</html>
